spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/stocksimulator

# Disable JPA/Hibernate autoconfiguration - we use JdbcTemplate directly
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# Disable Spring's automatic schema.sql execution
spring.sql.init.mode=never

# use local properties to get api key
spring.profiles.active=local
